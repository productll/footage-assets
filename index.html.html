const FB = 'https://footage-assets-default-rtdb.asia-southeast1.firebasedatabase.app';

async function fbRead(path){
  try{
    const r = await fetch(FB+'/'+path+'.json');
    if(!r.ok) return null;
    return await r.json();
  }catch(e){return null;}
}

async function fbWrite(path, data){
  try{
    const r = await fetch(FB+'/'+path+'.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    return r.ok;
  }catch(e){return false;}
}

async function getUsers(){
  const r = await fbRead('users');
  if(r && Array.isArray(r) && r.length>0) return r;
  return DEFAULT_USERS;
}

async function saveUsers(users){
  return await fbWrite('users', users);
}

async function saveCheckouts(cos){

async function getLogs(){

function setSyncDot(c){
  const d=document.getElementById('sync-dot');
  if(!d)return;
  const m={green:'#16A34A',red:'#DC2626',gray:'#94A3B8',amber:'#D97706'};
  d.style.background=m[c]||m.gray;
  if(c!=='gray')setTimeout(()=>setSyncDot('gray'),3000);
}

async function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('lb-err');
  err.style.display='none';
  btn.textContent='جاري التحقق...';btn.disabled=true;

  // Always fetch from Firebase
  const users = await getUsers();

  btn.textContent='دخول';btn.disabled=false;
  const found=users.find(x=>x.username.toLowerCase()===u&&x.password===p);
  if(!found){err.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';err.style.display='block';return;}
  if(found.disabled){err.textContent='حسابك موقوف — تواصل مع المحاسب';err.style.display='block';return;}

  CU=found;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('tb-av').textContent=CU.name[0];
  document.getElementById('tb-name').textContent=CU.name;

  if(CU.role==='accountant'){
    document.getElementById('acc-wrap').style.display='grid';
    await renderDash();
    startPolling();
  } else {
    document.getElementById('crew-wrap').style.display='block';
    document.getElementById('t-out').value=now();
    await renderCrewMain();
  }
}

function doLogout(){
  CU=null;
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('topbar').style.display='none';
  document.getElementById('acc-wrap').style.display='none';
  document.getElementById('crew-wrap').style.display='none';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
}

function toggleReset(){
  const b=document.getElementById('reset-box');
  b.style.display=b.style.display==='none'?'block':'none';
}

async function doReset(){
  const u=document.getElementById('r-user').value.trim().toLowerCase();
  const np=document.getElementById('r-new').value;
  const cp=document.getElementById('r-conf').value;
  const alrt=document.getElementById('r-alert');
  if(!u||!np){alrt.innerHTML='<span style="color:var(--red)">تعبئة جميع الحقول</span>';return;}
  if(np!==cp){alrt.innerHTML='<span style="color:var(--red)">كلمة المرور غير متطابقة</span>';return;}
  if(np.length<4){alrt.innerHTML='<span style="color:var(--red)">كلمة المرور قصيرة</span>';return;}
  const users=await getUsers();
  const found=users.find(x=>x.username.toLowerCase()===u);
  if(!found){alrt.innerHTML='<span style="color:var(--red)">المستخدم غير موجود</span>';return;}
  found.password=np;
  const ok=await saveUsers(users);
  if(ok){alrt.innerHTML='<span style="color:var(--green)">تم التغيير ✓</span>';setTimeout(()=>toggleReset(),2000);}
  else{alrt.innerHTML='<span style="color:var(--red)">خطأ — تحقق من الإنترنت</span>';}
}

let selCat='all';
let selAssets=new Set();

function showCrew(id){
  document.querySelectorAll('.cscr').forEach(s=>s.classList.remove('act'));
  document.getElementById(id).classList.add('act');
}

async function goCrew(id){
  showCrew(id);
  if(id==='cs-take'){selCat='all';selAssets=new Set();await renderTakeCats();document.getElementById('t-out').value=now();}
  if(id==='cs-return') await renderReturnList();
  if(id==='cs-main') await renderCrewMain();
  if(id==='cs-hist') await renderMyHist();
}

async function renderCrewMain(){
  const cos=await getCheckouts();
  const active=cos.filter(c=>!c.returned&&c.uid===CU.id);
  const el=document.getElementById('my-active');
  if(!active.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">لا توجد معدات خارجة</div>';return;}
  const g={};active.forEach(c=>{if(!g[c.gid]){g[c.gid]={proj:c.project,exp:c.dateExp,items:[]};}g[c.gid].items.push(c.assetName);});
  el.innerHTML=Object.values(g).map(x=>`<div style="padding:9px 0;border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-weight:600;font-size:13px">${x.proj}</div>
      <div style="font-size:11px;color:var(--soft);margin-top:2px">${x.items.join(' · ')}</div></div>
      ${isLate(x.exp)?'<span class="late-pill">متأخر</span>':''}
    </div></div>`).join('');
}

async function renderTakeCats(){
  const assets=await getAssets();
  const avail=assets.filter(a=>a.status==='available');
  const usedCats=['all',...FIELD_CATS.filter(c=>avail.some(a=>a.cat===c))];
  document.getElementById('take-cats').innerHTML=usedCats.map(c=>
    `<button class="cpill${c===selCat?' on':''}" onclick="setTakeCat('${c}')">${CAT_AR[c]||c}</button>`).join('');
  await renderTakeList(assets);
}

async function renderTakeList(assets){
  if(!assets) assets=await getAssets();
  const avail=assets.filter(a=>a.status==='available'&&(selCat==='all'||a.cat===selCat));
  const el=document.getElementById('take-list');
  el.innerHTML=avail.length?avail.map(a=>`
    <div class="aitem${selAssets.has(a.code)?' sel':''}" id="ai-${a.code}" onclick="toggleA('${a.code}')">
      <div class="aitem-dot"></div>
      <div>
        <div class="aitem-name">${a.name}</div>
        <div class="aitem-sub">${a.code}</div>
      </div>
    </div>`).join(''):'<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">لا توجد معدات متاحة</div>';
}

async function setTakeCat(c){
  selCat=c;
  document.querySelectorAll('.cpill').forEach(b=>b.classList.toggle('on',b.textContent===(CAT_AR[c]||c)));
  await renderTakeList();
}

function toggleA(code){
  selAssets.has(code)?selAssets.delete(code):selAssets.add(code);
  document.getElementById('ai-'+code)?.classList.toggle('sel',selAssets.has(code));
}

async function doTake(){
  const proj=document.getElementById('t-proj').value.trim();
  const dOut=document.getElementById('t-out').value;
  const dExp=document.getElementById('t-exp').value;
  const notes=document.getElementById('t-notes').value.trim();
  const alrt=document.getElementById('take-alert');
  if(!proj||!dOut||!dExp){alrt.innerHTML='<div class="calert err">يرجى تعبئة المشروع والتواريخ</div>';return;}
  if(!selAssets.size){alrt.innerHTML='<div class="calert err">اختر معدة واحدة على الأقل</div>';return;}
  const btn=document.getElementById('take-btn');btn.disabled=true;btn.textContent='جاري الحفظ...';
  alrt.innerHTML='<div class="calert warn">جاري التسجيل...</div>';
  const assets=await getAssets();const cos=await getCheckouts();
  const gid='CO'+Date.now();
  selAssets.forEach(code=>{
    const a=assets.find(x=>x.code===code);if(!a)return;
    a.status='out';
    cos.push({gid,code,assetName:a.name,assetCat:a.cat,uid:CU.id,userName:CU.name,userTitle:CU.title||'',project:proj,dateOut:dOut,dateExp:dExp,notes,returned:false});
  });
  const ok1=await saveAssets(assets);
  const ok2=await saveCheckouts(cos);
  btn.disabled=false;btn.textContent='تسجيل الخروج';
  if(ok1&&ok2){
    setSyncDot('green');
    alrt.innerHTML=`<div class="calert ok">تم تسجيل خروج ${selAssets.size} معدة ✓</div>`;
    selAssets=new Set();
    setTimeout(()=>goCrew('cs-main'),1200);
  } else {
    alrt.innerHTML='<div class="calert err">خطأ في الحفظ — تحقق من الإنترنت</div>';
  }
}

async function renderReturnList(){
  const cos=await getCheckouts();
  const active=cos.filter(c=>!c.returned&&c.uid===CU.id);
  const el=document.getElementById('ret-list');
  if(!active.length){el.innerHTML='<div class="ccard"><div style="text-align:center;padding:24px;color:var(--muted)">لا توجد معدات لإرجاعها</div></div>';return;}
  const g={};active.forEach(c=>{if(!g[c.gid]){g[c.gid]={proj:c.project,dOut:c.dateOut,dExp:c.dateExp,items:[]};}g[c.gid].items.push(c);});
  el.innerHTML=Object.entries(g).map(([gid,x])=>`
    <div class="ri-card">
      <div class="ri-top">
        <div><div class="ri-proj">${x.proj}</div><div class="ri-meta">خرج: ${fmt(x.dOut)} · متوقع: ${fmt(x.dExp)}</div></div>
        ${isLate(x.dExp)?'<span class="late-pill">متأخر</span>':''}
      </div>
      ${x.items.map(i=>`<div class="ri-row"><span style="flex:1;font-weight:600;font-size:13px">${i.assetName}</span>
        <label style="font-size:11px;color:var(--muted)">ساعات:</label>
        <input type="number" class="hrs-i" min="0" step="0.5" id="rh-${i.code}-${gid}" placeholder="0"></div>`).join('')}
      <div class="cf" style="margin-top:10px"><label>ملاحظات الإرجاع</label><input type="text" id="rn-${gid}" placeholder="حالة المعدات..."></div>
      <button class="csub" onclick="doReturn('${gid}')">تأكيد الإرجاع</button>
    </div>`).join('');
}

async function doReturn(gid){
  const cos=await getCheckouts();
  const items=cos.filter(c=>c.gid===gid&&!c.returned);
  const assets=await getAssets();const logs=await getLogs();
  const rn=document.getElementById(`rn-${gid}`)?.value||'';
  let totalDep=0;
  items.forEach(item=>{
    const hrs=parseFloat(document.getElementById(`rh-${item.code}-${gid}`)?.value)||0;
    const a=assets.find(x=>x.code===item.code);
    if(a){a.status='available';a.usedH=+(a.usedH+hrs).toFixed(1);}
    const dep=+(depR(a||{cost:0,lifeH:1})*hrs).toFixed(3);totalDep+=dep;
    logs.push({date:new Date().toISOString(),code:item.code,name:item.assetName,cat:item.assetCat,
      uid:CU.id,userName:CU.name,userTitle:CU.title||'',project:item.project,
      dateOut:item.dateOut,dateIn:now(),hours:hrs,dep,notes:rn});
    const ci=cos.find(c=>c.gid===gid&&c.code===item.code);if(ci)ci.returned=true;
  });
  const ok1=await saveAssets(assets);
  const ok2=await saveCheckouts(cos);
  const ok3=await saveLogs(logs);
  if(ok1&&ok2&&ok3){
    setSyncDot('green');
    document.getElementById('ret-alert').innerHTML=`<div class="calert ok">تم الإرجاع ✓  استهلاك: ${totalDep.toFixed(3)} ر</div>`;
    setTimeout(()=>renderReturnList(),400);
  } else {
    document.getElementById('ret-alert').innerHTML='<div class="calert err">خطأ في الحفظ — تحقق من الإنترنت</div>';
  }
}

async function renderMyHist(){
  const logs=(await getLogs()).filter(l=>l.uid===CU.id).sort((a,b)=>b.date.localeCompare(a.date));
  const tH=logs.reduce((s,l)=>s+l.hours,0);
  const tD=logs.reduce((s,l)=>s+l.dep,0);
  const pr=new Set(logs.map(l=>l.project)).size;
  document.getElementById('mh-stats').innerHTML=`
    <div style="text-align:center;background:var(--lb);border-radius:10px;padding:12px"><div style="font-size:20px;font-weight:700;color:var(--blue)">${logs.length}</div><div style="font-size:11px;color:var(--soft)">استخدامات</div></div>
    <div style="text-align:center;background:var(--lg);border-radius:10px;padding:12px"><div style="font-size:20px;font-weight:700;color:var(--green)">${tH.toFixed(1)}</div><div style="font-size:11px;color:var(--soft)">ساعات</div></div>
    <div style="text-align:center;background:var(--la);border-radius:10px;padding:12px"><div style="font-size:20px;font-weight:700;color:var(--amber)">${pr}</div><div style="font-size:11px;color:var(--soft)">مشاريع</div></div>`;
  document.getElementById('mh-list').innerHTML=logs.length?logs.map(l=>`
    <div style="padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-weight:600;font-size:13px">${l.name}</div>
        <div style="font-size:11px;color:var(--soft);margin-top:1px">${l.project}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:1px">${fmt(l.dateOut)} → ${fmt(l.dateIn)}</div></div>
        <div style="text-align:left"><div style="font-weight:700;font-size:13px">${l.hours}س</div>
        <div style="font-size:11px;color:var(--amber)">${l.dep.toFixed(3)}ر</div></div>
      </div></div>`).join(''):'<div class="empty">لا يوجد سجل</div>';
}

// ACCOUNTANT DASHBOARD
// ═══════════════════════════════════════════════
async function renderDash(){
  const [assets,logs,cos,users]=await Promise.all([getAssets(),getLogs(),getCheckouts(),getUsers()]);
  setSyncDot('green');
  const thisM=new Date().getMonth();const thisY=new Date().getFullYear();
  const mLog=logs.filter(l=>{const d=new Date(l.date);return d.getMonth()===thisM&&d.getFullYear()===thisY;});
  const mHrs=mLog.reduce((s,l)=>s+l.hours,0);
  const mDep=mLog.reduce((s,l)=>s+l.dep,0);
  const out=assets.filter(a=>a.status==='out').length;
  document.getElementById('ds-out').textContent=out;
  document.getElementById('ds-av').textContent=assets.filter(a=>a.status==='available').length;
  document.getElementById('ds-hrs').textContent=mHrs.toFixed(1);
  document.getElementById('ds-dep').textContent=mDep.toFixed(2);
  document.getElementById('asset-count-lbl').textContent=assets.length+' أصل مسجَّل';

  // Late alert
  const lates=cos.filter(c=>!c.returned&&isLate(c.dateExp));
  document.getElementById('dash-late').innerHTML=lates.length?
    `<div style="background:var(--la);border:1px solid var(--amber);color:var(--amber);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;margin-bottom:16px">⚠ متأخر: ${[...new Set(lates.map(c=>c.assetName))].slice(0,4).join('، ')}</div>`:'';

  // Dashboard active
  const active=cos.filter(c=>!c.returned);
  const g={};active.forEach(c=>{if(!g[c.gid]){g[c.gid]={name:c.userName,proj:c.project,exp:c.dateExp,items:[]};}g[c.gid].items.push(c.assetName);});
  document.getElementById('d-snap').innerHTML=Object.values(g).length?Object.values(g).map(x=>`
    <div style="padding:7px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><span style="font-weight:600;font-size:12px">${x.name}</span>
        <div style="font-size:11px;color:var(--soft)">${x.proj}</div>
        <div style="font-size:10px;color:var(--muted)">${x.items.slice(0,3).join(' · ')}${x.items.length>3?' +':''}
        </div></div>${isLate(x.exp)?'<span class="badge b-late">متأخر</span>':'<span class="badge b-out">خارج</span>'}
      </div></div>`).join(''):'<div class="empty">لا توجد أصول خارجة</div>';

  // Top bars
  const byA={};mLog.forEach(l=>{if(!byA[l.name])byA[l.name]=0;byA[l.name]+=l.hours;});
  const topA=Object.entries(byA).sort((a,b)=>b[1]-a[1]).slice(0,6);const mxA=topA[0]?.[1]||1;
  document.getElementById('d-top').innerHTML=topA.length?topA.map(([n,h])=>`
    <div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(h/mxA*100)}%"></div></div><div class="bar-val">${h.toFixed(1)}س</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';

  // Recent
  const recent=logs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  document.getElementById('d-recent').innerHTML=recent.length?recent.map(l=>`
    <div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
      <div style="display:flex;justify-content:space-between"><div><span style="font-weight:600">${l.name}</span> · ${l.userName}</div><span style="color:var(--amber);font-weight:600">${l.dep.toFixed(2)}ر</span></div>
      <div style="font-size:11px;color:var(--muted)">${l.project} · ${fmt(l.dateIn)}</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';

  // Prod bars
  const byU={};mLog.forEach(l=>{if(!byU[l.userName])byU[l.userName]={hrs:0,pr:new Set()};byU[l.userName].hrs+=l.hours;byU[l.userName].pr.add(l.project);});
  const uA=Object.entries(byU).sort((a,b)=>b[1].hrs-a[1].hrs);const mxU=uA[0]?.[1].hrs||1;
  document.getElementById('d-prod').innerHTML=uA.length?uA.map(([n,v])=>`
    <div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(v.hrs/mxU*100)}%"></div></div><div class="bar-val">${v.hrs.toFixed(1)}س</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';

  // Active table
  document.getElementById('active-tbl').innerHTML=active.length?active.map(c=>`<tr>
    <td style="font-weight:600">${c.assetName}</td><td><span class="badge b-cat">${c.assetCat||''}</span></td>
    <td>${c.userName}</td><td style="font-size:11px">${c.project}</td>
    <td style="font-size:11px">${fmt(c.dateOut)}</td><td style="font-size:11px">${fmt(c.dateExp)}</td>
    <td>${isLate(c.dateExp)?'<span class="badge b-late">متأخر</span>':'<span class="badge b-out">خارج</span>'}</td></tr>`).join(''):'<tr><td colspan="7" class="empty">لا توجد أصول خارجة</td></tr>';

  // Log filter selects
  const uSel=document.getElementById('lu2');
  if(uSel.options.length<=1){users.filter(u=>u.role==='crew').forEach(u=>{const o=new Option(u.name,u.id);uSel.add(o);});}
  const cSel=document.getElementById('lcat');
  if(cSel.options.length<=1){ALL_CATS.forEach(c=>{cSel.add(new Option(c,c));});}
  const afSel=document.getElementById('af-cat');
  if(afSel.options.length<=1){ALL_CATS.forEach(c=>{afSel.add(new Option(c,c));});}

  // Log table
  const q=(document.getElementById('lq')?.value||'').toLowerCase();
  const fu=document.getElementById('lu2')?.value||'';
  const fc=document.getElementById('lcat')?.value||'';
  const fm=document.getElementById('lmon')?.value||'';
  const fl=logs.filter(l=>{
    return(!fm||(l.dateOut||'').startsWith(fm))&&(!fu||l.uid===fu)&&(!fc||l.cat===fc)&&
      (!q||l.name.toLowerCase().includes(q)||l.userName.toLowerCase().includes(q)||l.project.toLowerCase().includes(q));
  }).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('log-tbl').innerHTML=fl.length?fl.map(l=>`<tr>
    <td style="font-weight:600">${l.name}</td><td><span class="badge b-cat">${l.cat||''}</span></td>
    <td>${l.userName}</td><td style="font-size:11px">${l.project}</td>
    <td style="font-size:11px">${fmt(l.dateOut)}</td><td style="font-size:11px">${fmt(l.dateIn)}</td>
    <td style="font-weight:600">${l.hours}س</td><td style="font-weight:600;color:var(--amber)">${l.dep.toFixed(3)}</td></tr>`).join(''):'<tr><td colspan="8" class="empty">لا توجد سجلات</td></tr>';

  // Dep bars
  const byAD={};logs.forEach(l=>{if(!byAD[l.name])byAD[l.name]=0;byAD[l.name]+=l.dep;});
  const topD=Object.entries(byAD).sort((a,b)=>b[1]-a[1]).slice(0,8);const mxD=topD[0]?.[1]||1;
  document.getElementById('dep-bars').innerHTML=topD.length?topD.map(([n,d])=>`
    <div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(d/mxD*100)}%"></div></div><div class="bar-val">${d.toFixed(2)}ر</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';
  const byCD={};logs.forEach(l=>{if(!byCD[l.cat])byCD[l.cat]=0;byCD[l.cat]+=l.dep;});
  const catD=Object.entries(byCD).sort((a,b)=>b[1]-a[1]);const mxCD=catD[0]?.[1]||1;
  document.getElementById('dep-cat-bars').innerHTML=catD.length?catD.map(([c,d])=>`
    <div class="bar-row"><div class="bar-lbl">${c}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(d/mxCD*100)}%"></div></div><div class="bar-val">${d.toFixed(2)}ر</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';
  document.getElementById('dep-tbl').innerHTML=assets.map(a=>{
    const pct=a.lifeH>0&&a.lifeH<9999?Math.min(Math.round(a.usedH/a.lifeH*100),100):0;
    const dep=+(depR(a)*a.usedH).toFixed(3);const col=pct>75?'var(--red)':pct>50?'var(--amber)':'var(--green)';
    return`<tr><td style="font-weight:600">${a.name}</td><td><span class="badge b-cat">${a.cat}</span></td>
    <td>${a.cost.toFixed(2)}</td><td>${a.usedH.toFixed(1)}</td>
    <td><div style="display:flex;align-items:center;gap:6px"><div class="prog"><div class="progf" style="width:${pct}%;background:${col}"></div></div><span style="font-size:11px;color:${col};font-weight:700">${pct}%</span></div></td>
    <td style="font-weight:600;color:var(--amber)">${dep}</td><td style="color:var(--green);font-weight:600">${(a.cost-dep).toFixed(3)}</td></tr>`;}).join('');

  // Prod table
  const byUP={};
  logs.forEach(l=>{
    if(!byUP[l.uid])byUP[l.uid]={name:l.userName,title:l.userTitle||'',hrs:0,pr:new Set(),dep:0,last:'',freq:{}};
    byUP[l.uid].hrs+=l.hours;byUP[l.uid].pr.add(l.project);byUP[l.uid].dep+=l.dep;
    if(l.date>byUP[l.uid].last)byUP[l.uid].last=l.date;
    byUP[l.uid].freq[l.name]=(byUP[l.uid].freq[l.name]||0)+1;
  });
  const uArr=Object.values(byUP).sort((a,b)=>b.hrs-a.hrs);
  const mxH=uArr[0]?.hrs||1;const mxPR=Math.max(...uArr.map(u=>u.pr.size),1);
  document.getElementById('prod-hrs').innerHTML=uArr.length?uArr.map(u=>`
    <div class="bar-row"><div class="bar-lbl">${u.name}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(u.hrs/mxH*100)}%"></div></div><div class="bar-val">${u.hrs.toFixed(1)}س</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';
  document.getElementById('prod-projs').innerHTML=uArr.length?uArr.map(u=>`
    <div class="bar-row"><div class="bar-lbl">${u.name}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(u.pr.size/mxPR*100)}%"></div></div><div class="bar-val">${u.pr.size}</div></div>`).join(''):'<div class="empty" style="padding:16px">لا بيانات</div>';
  document.getElementById('prod-tbl').innerHTML=uArr.length?uArr.map(u=>{
    const top=Object.entries(u.freq).sort((a,b)=>b[1]-a[1])[0];
    return`<tr><td style="font-weight:600">${u.name}</td><td style="color:var(--soft)">${u.title}</td>
    <td>${u.pr.size}</td><td style="font-weight:600">${u.hrs.toFixed(1)}س</td>
    <td style="font-size:11px">${u.last?fmt(u.last):'—'}</td>
    <td style="font-size:11px">${top?top[0]:'—'}</td>
    <td style="font-weight:600;color:var(--amber)">${u.dep.toFixed(3)}</td></tr>`;}).join(''):'<tr><td colspan="7" class="empty">لا بيانات</td></tr>';

  // Monthly report
  const mrSel=document.getElementById('mr-month');
  const months=new Set(logs.map(l=>(l.dateOut||'').slice(0,7)).filter(Boolean));
  if(mrSel.options.length<=1)[...months].sort().reverse().forEach(m=>{mrSel.add(new Option(m,m));});
  const selM=mrSel.value;
  if(selM){
    const mL=logs.filter(l=>(l.dateOut||'').startsWith(selM));
    document.getElementById('mr-dep').textContent=mL.reduce((s,l)=>s+l.dep,0).toFixed(3);
    document.getElementById('mr-hrs').textContent=mL.reduce((s,l)=>s+l.hours,0).toFixed(1);
    document.getElementById('mr-ops').textContent=mL.length;
    const byCode={};mL.forEach(l=>{if(!byCode[l.code])byCode[l.code]={name:l.name,cat:l.cat,hrs:0,dep:0};byCode[l.code].hrs+=l.hours;byCode[l.code].dep+=l.dep;});
    document.getElementById('mr-tbl').innerHTML=Object.entries(byCode).sort((a,b)=>b[1].dep-a[1].dep).map(([code,v])=>{
      const a=assets.find(x=>x.code===code)||{cost:0,usedH:0};
      const totalDep2=+(depR(a)*a.usedH).toFixed(3);
      return`<tr><td style="font-weight:600">${v.name}</td><td><span class="badge b-cat">${v.cat}</span></td>
      <td>${a.cost.toFixed(2)}</td><td>${v.hrs.toFixed(1)}</td>
      <td style="font-weight:700;color:var(--amber)">${v.dep.toFixed(3)}</td>
      <td style="color:var(--red)">${totalDep2}</td>
      <td style="color:var(--green);font-weight:600">${(a.cost-totalDep2).toFixed(3)}</td></tr>`;}).join('');
  }

  // Assets table
  const afFC=document.getElementById('af-cat')?.value||'';
  document.getElementById('assets-tbl').innerHTML=assets.filter(a=>!afFC||a.cat===afFC).map(a=>{
    const pct=a.lifeH>0&&a.lifeH<9999?Math.min(Math.round(a.usedH/a.lifeH*100),100):0;
    const col=pct>75?'var(--red)':pct>50?'var(--amber)':'var(--green)';
    return`<tr><td style="font-size:10px;color:var(--muted)">${a.code}</td>
    <td style="font-weight:600;font-size:12px">${a.name}</td>
    <td><span class="badge b-cat" style="font-size:9px">${a.cat}</span></td>
    <td>${a.cost.toFixed(2)}</td><td>${a.usedH.toFixed(1)}</td>
    <td><div style="display:flex;align-items:center;gap:6px"><div class="prog"><div class="progf" style="width:${pct}%;background:${col}"></div></div><span style="font-size:10px;color:${col};font-weight:700">${pct}%</span></div></td>
    <td><span class="badge ${a.status==='out'?'b-out':'b-in'}">${a.status==='out'?'خارج':'متاح'}</span></td></tr>`;}).join('');

  // Users list
  document.getElementById('users-list').innerHTML=users.map(u=>`
    <div class="ucard" style="${u.disabled?'opacity:.5':''}">
      <div class="uav" style="background:${u.role==='accountant'?'var(--lp)':'var(--lb)'};color:${u.role==='accountant'?'#7C3AED':'var(--blue)'}">${u.name[0]}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${u.name}${u.disabled?' <span class="badge b-late">موقوف</span>':''}</div>
        <div style="font-size:12px;color:var(--soft)">${u.title||''} · @${u.username}</div>
      </div>
      <span class="badge ${u.role==='accountant'?'b-adm':'b-cat'}">${u.role==='accountant'?'محاسب':'فني'}</span>
      ${u.username!=='accountant'?`
        <button onclick="doResetUserPass('${u.id}')" style="border:1px solid var(--border);background:white;color:var(--soft);padding:4px 8px;border-radius:7px;cursor:pointer;font-size:11px">🔑</button>
        <button onclick="doToggleUser('${u.id}')" style="border:none;background:${u.disabled?'var(--lg)':'var(--la)'};color:${u.disabled?'var(--green)':'var(--amber)'};padding:4px 8px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700">${u.disabled?'تفعيل':'إيقاف'}</button>
        <button onclick="doDelUser('${u.id}')" style="border:none;background:var(--lr);color:var(--red);padding:4px 8px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700">حذف</button>
      `:''}
    </div>`).join('');
}

function showPage(btn,pid){
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');
  document.querySelectorAll('.apg').forEach(p=>p.classList.remove('act'));document.getElementById(pid).classList.add('act');
  renderDash();
}

// ═══════════════════════════════════════════════
// USER MANAGEMENT
// ═══════════════════════════════════════════════
async function doAddUser(){
  const name=document.getElementById('nu-name').value.trim();
  const username=document.getElementById('nu-user').value.trim().toLowerCase();
  const pass=document.getElementById('nu-pass').value;
  const role=document.getElementById('nu-role').value;
  const title=document.getElementById('nu-title').value.trim();
  const alrt=document.getElementById('user-alert');
  if(!name||!username||!pass){alrt.innerHTML='<span style="color:var(--red)">يرجى تعبئة جميع الحقول</span>';return;}
  alrt.innerHTML='<span style="color:var(--amber)">جاري الحفظ في Firebase...</span>';
  const users=await getUsers();
  if(users.find(u=>u.username===username)){alrt.innerHTML='<span style="color:var(--red)">اسم المستخدم موجود</span>';return;}
  users.push({id:'u'+Date.now(),name,username,password:pass,role,title});
  const ok=await saveUsers(users);
  if(ok){
    setSyncDot('green');
    alrt.innerHTML='<span style="color:var(--green)">تم إضافة المستخدم وحفظه في Firebase ✓</span>';
    ['nu-name','nu-user','nu-pass','nu-title'].forEach(id=>document.getElementById(id).value='');
    await renderDash();
  } else {
    alrt.innerHTML='<span style="color:var(--red)">خطأ في الاتصال بـ Firebase</span>';
  }
}

async function doChangePass(){
  const old=document.getElementById('cp-old').value;
  const np=document.getElementById('cp-new').value;
  const cp=document.getElementById('cp-conf').value;
  const alrt=document.getElementById('cp-alert');
  if(!old||!np||!cp){alrt.innerHTML='<span style="color:var(--red)">تعبئة جميع الحقول</span>';return;}
  if(np!==cp){alrt.innerHTML='<span style="color:var(--red)">غير متطابقة</span>';return;}
  if(np.length<4){alrt.innerHTML='<span style="color:var(--red)">قصيرة جداً</span>';return;}
  const users=await getUsers();
  const me=users.find(u=>u.id===CU.id);
  if(!me||me.password!==old){alrt.innerHTML='<span style="color:var(--red)">كلمة المرور الحالية غير صحيحة</span>';return;}
  me.password=np;CU.password=np;
  const ok=await saveUsers(users);
  if(ok){alrt.innerHTML='<span style="color:var(--green)">تم التغيير ✓</span>';['cp-old','cp-new','cp-conf'].forEach(id=>document.getElementById(id).value='');}
  else{alrt.innerHTML='<span style="color:var(--red)">خطأ في الاتصال</span>';}
}

async function doResetUserPass(id){
  const np=prompt('كلمة المرور الجديدة للمستخدم:');
  if(!np||np.length<3){if(np!==null)alert('قصيرة جداً');return;}
  const users=await getUsers();
  const u=users.find(x=>x.id===id);
  if(u){u.password=np;const ok=await saveUsers(users);if(ok){setSyncDot('green');alert('تم التغيير ✓');await renderDash();}}
}

async function doToggleUser(id){
  const users=await getUsers();
  const u=users.find(x=>x.id===id);if(!u)return;
  u.disabled=!u.disabled;
  const ok=await saveUsers(users);if(ok){setSyncDot('green');await renderDash();}
}

async function doDelUser(id){
  if(!confirm('حذف هذا المستخدم؟'))return;
  const users=await getUsers();
  const ok=await saveUsers(users.filter(u=>u.id!==id));
  if(ok){setSyncDot('green');await renderDash();}
}

// ═══════════════════════════════════════════════
// ASSET MANAGEMENT
// ═══════════════════════════════════════════════
function toggleAddAsset(){document.getElementById('add-asset-form').classList.toggle('open');}

async function doAddAsset(){
  const code=document.getElementById('na-code').value.trim();
  const name=document.getElementById('na-name').value.trim();
  const alrt=document.getElementById('add-asset-alert');
  if(!code||!name){alrt.innerHTML='<span style="color:var(--red)">تعبئة الكود والاسم</span>';return;}
  alrt.innerHTML='<span style="color:var(--amber)">جاري الحفظ...</span>';
  const assets=await getAssets();
  assets.push({code,name,cat:document.getElementById('na-cat').value,
    cost:parseFloat(document.getElementById('na-cost').value)||0,
    lifeH:parseFloat(document.getElementById('na-life').value)||2000,
    usedH:0,status:'available'});
  const ok=await saveAssets(assets);
  if(ok){
    alrt.innerHTML='<span style="color:var(--green)">تم الحفظ ✓</span>';
    ['na-code','na-name','na-cost','na-life'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('add-asset-form').classList.remove('open');
    await renderDash();
  } else {
    alrt.innerHTML='<span style="color:var(--red)">خطأ في الاتصال</span>';
  }
}

// ═══════════════════════════════════════════════
// DATA MANAGEMENT
// ═══════════════════════════════════════════════
async function previewDel(){
  const type=document.getElementById('del-type').value;
  const filter=document.getElementById('del-filter').value.trim().toLowerCase();
  const data=type==='log'?await getLogs():await getCheckouts();
  const toDel=filter?data.filter(r=>(r.userName||'').toLowerCase().includes(filter)||(r.project||'').toLowerCase().includes(filter)):data;
  document.getElementById('del-preview').innerHTML=`<span style="color:var(--amber);font-weight:600">سيتم حذف ${toDel.length} سجل من أصل ${data.length}</span>`;
}

async function doDel(){
  const type=document.getElementById('del-type').value;
  const filter=document.getElementById('del-filter').value.trim().toLowerCase();
  const data=type==='log'?await getLogs():await getCheckouts();
  const remaining=filter?data.filter(r=>!(r.userName||'').toLowerCase().includes(filter)&&!(r.project||'').toLowerCase().includes(filter)):[];
  if(!confirm(`حذف ${data.length-remaining.length} سجل؟`))return;
  const ok=type==='log'?await saveLogs(remaining):await saveCheckouts(remaining);
  if(ok){setSyncDot('green');document.getElementById('del-preview').innerHTML='<span style="color:var(--green)">تم الحذف ✓</span>';await renderDash();}
}

async function clearAll(type){
  if(!confirm('سيتم مسح البيانات. هل أنت متأكد؟'))return;
  if(type==='all'){
    await saveLogs([]);await saveCheckouts([]);
    const assets=await getAssets();assets.forEach(a=>{a.usedH=0;a.status='available';});
    await saveAssets(assets);
  } else if(type==='log'){
    await saveLogs([]);
  } else {
    await saveCheckouts([]);
    const assets=await getAssets();assets.forEach(a=>a.status='available');await saveAssets(assets);
  }
  setSyncDot('green');await renderDash();
}

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
async function exportCSV(){
  const logs=await getLogs();
  const header="Asset,Code,Category,User,Project,DateOut,DateIn,Hours,Depreciation";
  const rows=logs.map(l=>[l.name,l.code,l.cat||'',l.userName,l.project,l.dateOut,l.dateIn,l.hours,l.dep.toFixed(3)].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv=[header,...rows].join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='FOOTAGE_log.csv';a.click();
}

async function exportMonthly(){
  const selM=document.getElementById('mr-month').value;
  if(!selM){alert('اختر الشهر أولاً');return;}
  const logs=(await getLogs()).filter(l=>(l.dateOut||'').startsWith(selM));
  const header="Asset,Code,Category,User,Project,DateOut,DateIn,Hours,Depreciation";
  const rows=logs.map(l=>[l.name,l.code,l.cat||'',l.userName,l.project,l.dateOut,l.dateIn,l.hours,l.dep.toFixed(3)].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv=[header,...rows].join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='FOOTAGE_monthly_'+selM+'.csv';a.click();
}

// ═══════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════
function startPolling(){
  setInterval(async()=>{
    if(!CU||CU.role!=='accountant')return;
    await renderDash();
    setSyncDot('green');
  },20000);
}

// Initialize Firebase with default data if empty
async function initFirebase(){
  const users=await fbRead('users');
  if(!users||!Array.isArray(users)||users.length===0){
    await fbWrite('users',DEFAULT_USERS);
  }
  const assets=await fbRead('assets');
  if(!assets||!Array.isArray(assets)||assets.length===0){
    await fbWrite('assets',INIT_ASSETS);
  }
  const cos=await fbRead('checkouts');
  if(!cos){await fbWrite('checkouts',[]);}
  const logs=await fbRead('log');
  if(!logs){await fbWrite('log',[]);}
}

// Start
initFirebase();
</script>
